<?xml version="1.0" encoding="utf-8"?>
<!-- momentia-icon-master.svg -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Momentia icon">
  <!-- Transparent background -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- Colors -->
  <!-- Navy: #0A1B2A -->
  <!-- Orange: #F97316 -->

  <!-- Arc with final, approved symmetric gap -->
  <path
    d="M 349.00 109.80 A 200 200 0 1 1 251.00 109.80"
    fill="none"
    stroke="#0A1B2A"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Final orange dot -->
  <circle cx="300" cy="100" r="22" fill="#F97316"/>

  <!-- Final approved 'M' -->
  <path
    d="M 160 340
       C 190 215, 245 215, 265 290
       C 285 365, 330 200, 370 290
       C 405 365, 445 340, 497 335"
    fill="none"
    stroke="#0A1B2A"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
